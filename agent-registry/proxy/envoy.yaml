# IBaseIT Style 3 — Envoy egress proxy with ext_authz to the inspection core.
# Reference config rendered by the Helm chart. The ext_authz filter is what
# makes this the "same brain" as the SDK and gateway: Envoy delegates the
# allow/block decision (and policy resolution) to the IBaseIT core.
static_resources:
  listeners:
    - name: egress_llm
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: egress_llm
                route_config:
                  name: llm_routes
                  virtual_hosts:
                    - name: llm_providers
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { host_rewrite_literal: api.openai.com, cluster: openai }
                http_filters:
                  # Inline policy enforcement — calls the IBaseIT inspection core.
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      # failure_mode_allow mirrors the Helm `failMode` value.
                      failure_mode_allow: true
                      grpc_service:
                        envoy_grpc: { cluster_name: ibaseit_core }
                        timeout: 0.25s   # latencyBudgetMs
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: ibaseit_core
      type: STRICT_DNS
      load_assignment:
        cluster_name: ibaseit_core
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: registry.ibaseit.com, port_value: 443 }
    - name: openai
      type: STRICT_DNS
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
      load_assignment:
        cluster_name: openai
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api.openai.com, port_value: 443 }
